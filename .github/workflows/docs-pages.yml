name: Publish documentation to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

# Pages deployment needs these explicit permissions when using actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent two documentation deployments from racing each other.
concurrency:
  group: github-pages-docs
  cancel-in-progress: false

jobs:
  check-pages-flag:
    name: Check GitHub Pages feature flag
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    outputs:
      enabled: ${{ steps.flag.outputs.enabled }}
    steps:
      - name: Read USE_GITHUB_PAGES
        id: flag
        run: |
          if [ "${USE_GITHUB_PAGES}" = "true" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          USE_GITHUB_PAGES: ${{ vars.USE_GITHUB_PAGES }}

  publish:
    name: Build and publish VitePress site
    runs-on: ubuntu-latest
    needs: check-pages-flag
    # The repository/environment variable is an explicit feature flag. The
    # check-pages-flag job reads it after entering the github-pages environment,
    # so environment-scoped variables are supported as well as repository variables.
    if: ${{ needs.check-pages-flag.outputs.enabled == 'true' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install documentation dependencies
        working-directory: site
        run: npm ci

      - name: Build VitePress documentation
        working-directory: site
        env:
          VITEPRESS_BASE: ${{ vars.GITHUB_PAGES_CNAME != '' && '/' || format('/{0}/', github.event.repository.name) }}
        run: npm run build

      - name: Disable Jekyll for generated site
        run: touch site/dist/.nojekyll

      - name: Add custom domain CNAME
        # GitHub Pages also stores the custom domain in repository settings, but
        # adding CNAME to the artifact keeps the domain attached on every deploy.
        # Set repository variable GITHUB_PAGES_CNAME to your domain, for example docs.example.com.
        if: ${{ vars.GITHUB_PAGES_CNAME != '' }}
        run: printf '%s\n' '${{ vars.GITHUB_PAGES_CNAME }}' > site/dist/CNAME

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
